services:
  postgres:
    image: postgres:16
    container_name: myclaw-cloud-postgres
    environment:
      POSTGRES_DB: myclaw_cloud
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
