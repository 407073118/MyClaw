<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Viewer</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0c0c0c;
      color: #ededed;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .header h2 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(16, 163, 127, 0.15);
      color: #10a37f;
      font-weight: 500;
    }

    .search-box {
      width: 100%;
      height: 32px;
      padding: 0 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      background: #181818;
      color: #ededed;
      font-size: 13px;
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-box:focus {
      border-color: rgba(255, 255, 255, 0.2);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      text-align: left;
      padding: 8px 10px;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #a3a3a3;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    tbody td {
      padding: 8px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      color: #ededed;
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
    }

    .status-active { background: rgba(16, 163, 127, 0.15); color: #10a37f; }
    .status-inactive { background: rgba(239, 68, 68, 0.15); color: #f87171; }
    .status-pending { background: rgba(234, 179, 8, 0.15); color: #facc15; }

    .empty-state {
      text-align: center;
      padding: 40px 16px;
      color: #737373;
      font-size: 13px;
    }

    .waiting {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: #737373;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div v-if="!loaded" class="waiting">等待数据加载...</div>
    <template v-else>
      <div class="header">
        <h2>{{ title }}</h2>
        <span class="badge">{{ filteredRows.length }} 条记录</span>
      </div>

      <input
        v-model="search"
        class="search-box"
        placeholder="搜索..."
      />

      <table v-if="filteredRows.length > 0">
        <thead>
          <tr>
            <th v-for="col in columns" :key="col">{{ col }}</th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="(row, idx) in filteredRows" :key="idx">
            <td v-for="col in columns" :key="col">
              <span
                v-if="col === 'status'"
                :class="['status', 'status-' + (row[col] || '').toLowerCase()]"
              >{{ row[col] }}</span>
              <template v-else>{{ row[col] }}</template>
            </td>
          </tr>
        </tbody>
      </table>

      <div v-else class="empty-state">没有匹配的记录</div>
    </template>
  </div>

  <script>
    const { createApp, ref, computed } = Vue;

    createApp({
      setup() {
        const loaded = ref(false);
        const title = ref("Data Viewer");
        const columns = ref([]);
        const rows = ref([]);
        const search = ref("");

        const filteredRows = computed(() => {
          if (!search.value) return rows.value;
          const q = search.value.toLowerCase();
          return rows.value.filter((row) =>
            Object.values(row).some((v) =>
              String(v).toLowerCase().includes(q)
            )
          );
        });

        // Listen for data from host
        window.addEventListener("message", (e) => {
          if (e.data?.type === "skill-data" && e.data.payload) {
            const payload = e.data.payload;
            title.value = payload.title || payload.skillName || "Data Viewer";

            if (payload.columns && payload.rows) {
              columns.value = payload.columns;
              rows.value = payload.rows;
            } else if (Array.isArray(payload.data)) {
              // Auto-detect columns from first row
              rows.value = payload.data;
              columns.value = payload.data.length > 0
                ? Object.keys(payload.data[0])
                : [];
            }

            loaded.value = true;
          }

          // Support incremental updates
          if (e.data?.type === "skill-update" && e.data.payload) {
            if (Array.isArray(e.data.payload)) {
              rows.value = e.data.payload;
            }
          }
        });

        return { loaded, title, columns, rows, search, filteredRows };
      },
    }).mount("#app");
  </script>
</body>
</html>
