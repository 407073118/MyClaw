<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Skills 样例 — 团队总览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0c0c0c; color: #ededed; padding: 20px;
    }

    /* ---- 顶部导航 ---- */
    .nav-bar {
      display: flex; gap: 8px; margin-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 12px;
    }
    .nav-btn {
      padding: 6px 14px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.08);
      background: transparent; color: #a3a3a3; font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.04); color: #ededed; }
    .nav-btn.active {
      background: rgba(16,163,127,0.12); border-color: rgba(16,163,127,0.3);
      color: #10a37f; font-weight: 600;
    }

    /* ---- 页头 ---- */
    .page-header {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-bottom: 20px;
    }
    .page-header h1 { font-size: 20px; font-weight: 700; }
    .page-header .meta { font-size: 12px; color: #737373; }
    .sprint-badge {
      font-size: 11px; padding: 3px 10px; border-radius: 999px;
      background: rgba(59,130,246,0.12); color: #60a5fa; font-weight: 500;
    }

    /* ---- 统计摘要 ---- */
    .summary-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
      margin-bottom: 24px;
    }
    .summary-card {
      background: #141414; border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; padding: 16px; text-align: center;
    }
    .summary-card .value {
      font-size: 28px; font-weight: 700; margin-bottom: 4px;
    }
    .summary-card .label { font-size: 11px; color: #737373; text-transform: uppercase; letter-spacing: 0.05em; }
    .clr-green { color: #10a37f; }
    .clr-blue { color: #3b82f6; }
    .clr-orange { color: #f59e0b; }
    .clr-red { color: #ef4444; }

    /* ---- 成员卡片 ---- */
    .section-title {
      font-size: 13px; font-weight: 600; color: #a3a3a3;
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px;
    }
    .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
    .member-card {
      background: #141414; border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; padding: 14px; display: flex; gap: 12px;
      transition: border-color 0.15s; cursor: default;
    }
    .member-card:hover { border-color: rgba(255,255,255,0.12); }
    .member-avatar {
      width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff;
    }
    .member-info { flex: 1; min-width: 0; }
    .member-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .member-role { font-size: 11px; color: #737373; margin-bottom: 6px; }
    .member-task {
      font-size: 12px; color: #a3a3a3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .member-progress {
      margin-top: 8px; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.06); overflow: hidden;
    }
    .member-progress-bar { height: 100%; border-radius: 2px; transition: width 0.3s; }

    .status-dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      margin-right: 6px; vertical-align: middle;
    }
    .status-working  { background: #10a37f; box-shadow: 0 0 6px rgba(16,163,127,0.5); }
    .status-review   { background: #3b82f6; }
    .status-idle     { background: #737373; }
    .status-blocked  { background: #ef4444; box-shadow: 0 0 6px rgba(239,68,68,0.5); }

    .avatar-green  { background: linear-gradient(135deg, #10a37f, #059669); }
    .avatar-blue   { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    .avatar-purple { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
    .avatar-orange { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .avatar-red    { background: linear-gradient(135deg, #ef4444, #dc2626); }

    .waiting { display: flex; align-items: center; justify-content: center; height: 200px; color: #737373; }
    .footer { margin-top: 24px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 11px; color: #525252; display: flex; justify-content: space-between; }
  </style>
</head>
<body>
  <div id="app">
    <div class="waiting" id="loading">等待数据加载...</div>
  </div>

  <script>
    const avatarColors = ['avatar-green', 'avatar-blue', 'avatar-purple', 'avatar-orange', 'avatar-red'];
    const statusLabels = { working: '工作中', review: '评审中', idle: '空闲', blocked: '阻塞' };

    function render(data) {
      const team = data.team || {};
      const metrics = data.metrics || {};
      const members = team.members || [];
      const summary = metrics.summary || {};

      const completedPct = summary.totalTasks ? Math.round((summary.completed / summary.totalTasks) * 100) : 0;

      document.getElementById('app').innerHTML = `
        <nav class="nav-bar">
          <button class="nav-btn active">团队总览</button>
          <button class="nav-btn" onclick="navigateTo('report.html')">数据报表</button>
          <button class="nav-btn" onclick="navigateTo('logs.html')">操作日志</button>
        </nav>

        <div class="page-header">
          <div>
            <h1>${team.project || 'Skills 样例'}</h1>
            <div class="meta">${team.startDate || ''} ~ ${team.endDate || ''}</div>
          </div>
          <span class="sprint-badge">${team.sprint || 'Sprint'}</span>
        </div>

        <div class="summary-row">
          <div class="summary-card">
            <div class="value clr-green">${summary.completed || 0}</div>
            <div class="label">已完成</div>
          </div>
          <div class="summary-card">
            <div class="value clr-blue">${summary.inProgress || 0}</div>
            <div class="label">进行中</div>
          </div>
          <div class="summary-card">
            <div class="value clr-orange">${summary.blocked || 0}</div>
            <div class="label">阻塞</div>
          </div>
          <div class="summary-card">
            <div class="value" style="color:#ededed">${completedPct}%</div>
            <div class="label">总进度</div>
          </div>
        </div>

        <div class="section-title">团队成员 (${members.length})</div>
        <div class="member-grid">
          ${members.map((m, i) => {
            const pct = m.tasksTotal ? Math.round((m.tasksCompleted / m.tasksTotal) * 100) : 0;
            const barColor = m.status === 'blocked' ? '#ef4444' : m.status === 'idle' ? '#737373' : '#10a37f';
            return `
              <div class="member-card" onclick="selectMember('${m.id}')">
                <div class="member-avatar ${avatarColors[i % avatarColors.length]}">${m.avatar}</div>
                <div class="member-info">
                  <div class="member-name">
                    <span class="status-dot status-${m.status}"></span>${m.name}
                  </div>
                  <div class="member-role">${m.role} · ${statusLabels[m.status] || m.status}</div>
                  <div class="member-task">${m.currentTask || '暂无任务'}</div>
                  <div class="member-progress">
                    <div class="member-progress-bar" style="width:${pct}%;background:${barColor}"></div>
                  </div>
                </div>
              </div>
            `;
          }).join('')}
        </div>

        <div class="footer">
          <span>MyClaw Skill 示例 · Skills 样例</span>
          <span>最后更新: ${new Date().toLocaleString('zh-CN')}</span>
        </div>
      `;
    }

    // ============================================================
    // 核心：postMessage 通信
    // ============================================================

    // 接收宿主发来的数据
    window.addEventListener("message", (e) => {
      if (e.data?.type === "skill-data" && e.data.payload) {
        render(e.data.payload);
      }
      if (e.data?.type === "skill-update" && e.data.payload) {
        render(e.data.payload);
      }
    });

    // 页面内导航 → 通知宿主切换页面
    function navigateTo(page) {
      window.parent.postMessage({
        type: "skill-callback",
        action: "navigate",
        data: { page }
      }, "*");
    }

    // 点击成员 → 回调给宿主
    function selectMember(memberId) {
      window.parent.postMessage({
        type: "skill-callback",
        action: "select-member",
        data: { memberId }
      }, "*");
    }
  </script>
</body>
</html>
