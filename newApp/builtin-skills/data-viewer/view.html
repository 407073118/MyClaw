<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Viewer</title>
  <!--
    ============================================================
    MyClaw Skill 示例 — Data Viewer
    ============================================================
    本文件在 WebPanel iframe 中运行。
    数据通过 postMessage 从宿主注入，不需要后端。

    你可以用任意前端框架：
    - 本例用 Vue 3 CDN（轻量、单文件友好）
    - 也可以用纯 JS、React CDN、Svelte 等

    复制本文件作为你自己 Skill 的模板。
    ============================================================
  -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    /* ---- 基础样式（匹配 MyClaw 暗色主题）---- */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0c0c0c;
      color: #ededed;
      padding: 16px;
    }

    /* ---- 头部 ---- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .header h2 { font-size: 15px; font-weight: 600; }
    .badge {
      font-size: 11px; padding: 2px 8px; border-radius: 999px;
      background: rgba(16, 163, 127, 0.15); color: #10a37f; font-weight: 500;
    }

    /* ---- 搜索框 ---- */
    .search-box {
      width: 100%; height: 32px; padding: 0 10px;
      border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 6px;
      background: #181818; color: #ededed; font-size: 13px;
      margin-bottom: 12px; outline: none; transition: border-color 0.15s;
    }
    .search-box:focus { border-color: rgba(255, 255, 255, 0.2); }

    /* ---- 表格 ---- */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      text-align: left; padding: 8px 10px; font-weight: 600;
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
      color: #a3a3a3; border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    tbody td {
      padding: 8px 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }
    tbody tr:hover { background: rgba(255, 255, 255, 0.04); }

    /* ---- 状态标签 ---- */
    .status {
      display: inline-block; padding: 2px 8px;
      border-radius: 999px; font-size: 11px; font-weight: 500;
    }
    .status-active  { background: rgba(16,163,127,0.15); color: #10a37f; }
    .status-inactive { background: rgba(239,68,68,0.15); color: #f87171; }
    .status-pending  { background: rgba(234,179,8,0.15); color: #facc15; }

    /* ---- 空状态 & 等待 ---- */
    .empty-state { text-align: center; padding: 40px 16px; color: #737373; font-size: 13px; }
    .waiting {
      display: flex; align-items: center; justify-content: center;
      height: 200px; color: #737373; font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- 等待宿主发送数据 -->
    <div v-if="!loaded" class="waiting">等待数据加载...</div>

    <template v-else>
      <div class="header">
        <h2>{{ title }}</h2>
        <span class="badge">{{ filteredRows.length }} 条记录</span>
      </div>

      <input v-model="search" class="search-box" placeholder="搜索..." />

      <table v-if="filteredRows.length > 0">
        <thead>
          <tr><th v-for="col in columns" :key="col">{{ col }}</th></tr>
        </thead>
        <tbody>
          <tr v-for="(row, idx) in filteredRows" :key="idx">
            <td v-for="col in columns" :key="col">
              <!-- status 列自动高亮 -->
              <span v-if="col === 'status'"
                :class="['status', 'status-' + (row[col] || '').toLowerCase()]"
              >{{ row[col] }}</span>
              <template v-else>{{ row[col] }}</template>
            </td>
          </tr>
        </tbody>
      </table>

      <div v-else class="empty-state">没有匹配的记录</div>
    </template>
  </div>

  <script>
    /**
     * ============================================================
     * 核心逻辑：监听 postMessage 接收数据
     * ============================================================
     *
     * 宿主发送的消息格式:
     *
     *   { type: "skill-data", payload: { title, columns, rows } }
     *     → 首次加载完整数据
     *
     *   { type: "skill-update", payload: [...rows] }
     *     → 增量替换行数据
     *
     *   { type: "skill-progress", current: 3, total: 10, message: "..." }
     *     → 进度通知（本例未使用，可扩展）
     */
    const { createApp, ref, computed } = Vue;

    createApp({
      setup() {
        const loaded = ref(false);
        const title = ref("Data Viewer");
        const columns = ref([]);
        const rows = ref([]);
        const search = ref("");

        const filteredRows = computed(() => {
          if (!search.value) return rows.value;
          const q = search.value.toLowerCase();
          return rows.value.filter((row) =>
            Object.values(row).some((v) =>
              String(v).toLowerCase().includes(q)
            )
          );
        });

        window.addEventListener("message", (e) => {
          const msg = e.data;
          if (!msg || !msg.type) return;

          // ① 首次数据加载
          if (msg.type === "skill-data" && msg.payload) {
            const p = msg.payload;
            title.value = p.title || p.skillName || "Data Viewer";

            if (p.columns && p.rows) {
              // 明确指定列名
              columns.value = p.columns;
              rows.value = p.rows;
            } else if (Array.isArray(p.data)) {
              // 自动从第一行推断列名
              rows.value = p.data;
              columns.value = p.data.length > 0 ? Object.keys(p.data[0]) : [];
            }
            loaded.value = true;
          }

          // ② 增量更新
          if (msg.type === "skill-update" && Array.isArray(msg.payload)) {
            rows.value = msg.payload;
          }
        });

        // === 如果需要主动发回调给宿主，用以下方式 ===
        // window.parent.postMessage({
        //   type: "skill-callback",
        //   action: "row-click",
        //   data: { rowIndex: 0 }
        // }, "*");

        return { loaded, title, columns, rows, search, filteredRows };
      },
    }).mount("#app");
  </script>
</body>
</html>
