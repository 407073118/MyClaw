<div style="
  position: relative;
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  background: var(--color-bg);
  font-family: var(--font-main);
">

  <!-- ── 背景装饰层 ─────────────────────────────────── -->

  <!-- 微妙渐变覆盖 -->
  <div style="
    position: absolute;
    top: 0;
    left: 0;
    width: 1920px;
    height: 1080px;
    background: linear-gradient(180deg, var(--color-bg) 0%, var(--color-surface) 100%);
    opacity: 0.7;
  "></div>

  <!-- 右上角装饰圆 -->
  <div style="
    position: absolute;
    top: -150px;
    right: -100px;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--color-secondary), transparent 70%);
    opacity: 0.06;
    filter: blur(40px);
  "></div>

  <!-- 左侧装饰竖线 -->
  <div style="
    position: absolute;
    top: 160px;
    left: 120px;
    width: 4px;
    height: 60px;
    background: linear-gradient(to bottom, var(--color-primary), var(--color-secondary));
    border-radius: 2px;
  "></div>

  <!-- 微点纹理 -->
  <svg style="position:absolute;top:0;left:0;width:1920px;height:1080px;opacity:0.02;" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="kp-dots" width="40" height="40" patternUnits="userSpaceOnUse">
        <circle cx="20" cy="20" r="1" fill="var(--color-primary)"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#kp-dots)"/>
  </svg>

  <!-- ── 内容层 ──────────────────────────────────────── -->

  <!-- 页面标题 -->
  <div style="
    position: absolute;
    top: 160px;
    left: 148px;
    width: 1600px;
    height: 70px;
    display: flex;
    align-items: center;
  ">
    <span style="
      font-size: 38px;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: -0.3px;
    ">{{title}}</span>
  </div>

  <!-- 标题下强调线 -->
  <div style="
    position: absolute;
    top: 248px;
    left: 148px;
    width: 60px;
    height: 3px;
    background: linear-gradient(to right, var(--color-primary), var(--color-secondary));
    border-radius: 1.5px;
  "></div>

  <!-- 要点列表区域 -->
  <div style="
    position: absolute;
    top: 300px;
    left: 148px;
    width: 1624px;
    height: 700px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  ">

    {{#each points}}
    <div style="
      display: flex;
      align-items: center;
      padding: 24px 36px;
      background: var(--color-surface);
      border-radius: 16px;
      border: 1px solid color-mix(in srgb, var(--color-primary) 6%, transparent);
      box-shadow: 0 2px 12px rgba(0,0,0,0.03), 0 1px 3px rgba(0,0,0,0.02);
      flex: 1;
      min-height: 80px;
      transition: none;
    ">
      <!-- 序号圆圈 -->
      <div style="
        flex-shrink: 0;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: 28px;
        box-shadow: 0 4px 16px color-mix(in srgb, var(--color-primary) 25%, transparent);
      ">
        <span style="
          font-family: var(--font-metric);
          font-size: 22px;
          font-weight: 700;
          color: var(--color-text-on-primary);
        ">{{#if icon}}{{icon}}{{else}}{{math @index '+' 1}}{{/if}}</span>
      </div>

      <!-- 要点文字 -->
      <div style="
        flex: 1;
        display: flex;
        align-items: center;
      ">
        <span style="
          font-size: 22px;
          font-weight: 400;
          color: var(--color-text);
          line-height: 1.5;
        ">{{text}}</span>
      </div>

      <!-- 右侧装饰点 -->
      <div style="
        flex-shrink: 0;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--color-secondary);
        opacity: 0.3;
        margin-left: 20px;
      "></div>
    </div>
    {{/each}}

  </div>

  <!-- 底部渐变线 -->
  <div style="
    position: absolute;
    bottom: 0;
    left: 0;
    width: 1920px;
    height: 3px;
    background: linear-gradient(to right, var(--color-primary), var(--color-secondary), transparent);
  "></div>

</div>
